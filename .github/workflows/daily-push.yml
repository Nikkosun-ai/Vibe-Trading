name: NQP Daily Push

on:
  schedule:
    # 北京时间 14:30 (UTC 06:30) 盘中
    - cron: '30 6 * * 1-5'
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install baostock pandas requests

      - name: Run daily push
        env:
          FANGTANG_KEY: ${{ secrets.FANGTANG_KEY }}
        run: python cloud/daily_push.py
