name: NQP Pool Weekly Rotation

on:
  schedule:
    - cron: '0 0 * * 1'   # 每周一 00:00 UTC (= 北京时间 08:00)
  workflow_dispatch:        # 手动触发

jobs:
  rotate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install akshare pandas

      - name: Run pool rotator
        run: python cloud/pool_rotator.py

      - name: Commit & push
        run: |
          git config user.name "NQP Pool Bot"
          git config user.email "bot@nqp-pool.local"
          git add cloud/daily_pipeline.py cloud/pool_result.json
          git diff --staged --quiet || git commit -m "chore: weekly pool rotation $(date +%Y-%m-%d)"
          git push

      - name: Notify via ServerChan
        if: always()
        env:
          SENDKEY: ${{ secrets.SERVER_CHAN_SENDKEY }}
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            TITLE="✅ NQP池轮换完成"
            CONTENT="每周池轮换 $(date +%Y-%m-%d) 成功。"
          else
            TITLE="❌ NQP池轮换失败"
            CONTENT="每周池轮换 $(date +%Y-%m-%d) 执行失败，检查日志。"
          fi
          curl -s -X POST "https://sctapi.ftqq.com/${SENDKEY}.send" \
            -d "title=${TITLE}" -d "desp=${CONTENT}"
