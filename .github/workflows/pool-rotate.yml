name: NQP Pool Weekly Rotation

on:
  schedule:
    - cron: '0 12 * * 0'  # 每周日 12:00 UTC (= 北京时间 20:00)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rotate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout nqp-signal-pipeline
        uses: actions/checkout@v4
        with:
          repository: Nikkosun-ai/nqp-signal-pipeline
          path: nqp-pipeline
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas requests

      - name: Run pool rotator
        working-directory: nqp-pipeline
        run: python cloud/pool_rotator.py

      - name: Commit & push pool
        working-directory: nqp-pipeline
        run: |
          git config user.name "NQP Pool Bot"
          git config user.email "bot@nqp-pool.local"
          git add cloud/pool_result.json
          if git diff --cached --quiet; then
            echo "池无变化，跳过提交"
          else
            git commit -m "chore: 每周池轮换 $(date +%Y-%m-%d)"
            git pull --rebase origin main
            git push origin main
            echo "池已更新并推送"
          fi

      - name: Notify via ServerChan
        if: always()
        env:
          SENDKEY: ${{ secrets.SERVER_CHAN_SENDKEY }}
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            TITLE="✅ NQP 池轮换完成"
            curl -s -X POST "https://sctapi.ftqq.com/${SENDKEY}.send" \
              -d "title=${TITLE}" -d "desp=每周池轮换 $(date +%Y-%m-%d) 成功"
          else
            TITLE="❌ NQP 池轮换失败"
            curl -s -X POST "https://sctapi.ftqq.com/${SENDKEY}.send" \
              -d "title=${TITLE}" -d "desp=每周池轮换 $(date +%Y-%m-%d) 失败，请检查 Actions 日志"
          fi
